creation_rules:
  - path_regex: hosts/nixnas/secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
    - age: [*nixnas, *fokus, *private]

  # --- LXC Service Containers (Specific Isolation) ---


  - path_regex: services/hedgedoc/.*\.enc\.yaml$
    key_groups:
    - age: [*nixhedgedoc, *fokus, *private]

  - path_regex: services/adguard/.*\.enc\.yaml$
    key_groups:
    - age: [*nixadguard, *fokus, *private]

  # Headscale & Headplane
  - path_regex: services/headscale/.*\.enc\.yaml$
    key_groups:
      - age: [*nixheadscale, *fokus, *private]

  # Adguard (LXC version)
  - path_regex: services/adguardhome/.*\.enc\.yaml$
    key_groups:
      - age: [*nixadguard, *fokus, *private]

  # Postgres & Zitadel (Shared group because Zitadel needs Postgres credentials)
  - path_regex: services/(postgres|zitadel)/.*\.enc\.yaml$
    key_groups:
      - age: [*nixpostgres, *nixzitadel, *fokus, *private]

  # Paperless
  - path_regex: services/paperless/.*\.enc\.yaml$
    key_groups:
      - age: [*nixpaperless, *fokus, *private]

  # Monitoring Stack
  - path_regex: services/(influxv2|grafana)/.*\.enc\.yaml$
    key_groups:
      - age: [*nixinflux, *nixgrafana, *fokus, *private]

  # Home Automation
  - path_regex: services/homeassistant/.*\.enc\.yaml$
    key_groups:
      - age: [*nixhomeassistant, *fokus, *private]

  # Networking & Others
  - path_regex: services/nginx/.*\.enc\.yaml$
    key_groups:
      - age: [*nixnginx, *fokus, *private]

  - path_regex: services/netbox/.*\.enc\.yaml$
    key_groups:
      - age: [*nixheadscale, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/keycloak/secrets.enc.yaml$
    key_groups:
      - age: [*nixkeycloak, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/keycloak/postgres.enc.yaml$
    key_groups:
      - age: [*nixkeycloak, *nixpostgres, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/immich/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/immich/secrets.enc.yaml$
    key_groups:
      - age: [*niximmich, *fokus, *private] # Adjust if netbox has its own key


  # Catch-all for any other services (Safety net for the NAS)
  - path_regex: services/.*\.enc\.yaml$
    key_groups:
      - age: [*fokus, *private]
        
  - path_regex: secrets/pve2.enc.yaml
    key_groups:
      - age: [*fokus, *private, *pve2]