creation_rules:
  - path_regex: services/listmonk/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *nixlistmonk, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/listmonk/.*\.enc\.yaml$
    key_groups:
      - age: [*nixlistmonk, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/immich/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *niximmich, *fokus, *private]

  - path_regex: services/immich/.*\.enc\.yaml$
    key_groups:
      - age: [*niximmich, *fokus, *private]

  - path_regex: services/keycloak/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *nixkeycloak, *fokus, *private]

  - path_regex: services/keycloak/.*\.enc\.yaml$
    key_groups:
      - age: [*nixkeycloak, *fokus, *private]

  - path_regex: services/hass/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *nixhomeassistant, *fokus, *private]

  - path_regex: services/hass/.*\.enc\.yaml$
    key_groups:
      - age: [*nixhomeassistant, *fokus, *private]

  - path_regex: services/paperless/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *nixpaperless, *fokus, *private]

  - path_regex: services/paperless/.*\.enc\.yaml$
    key_groups:
      - age: [*nixpaperless, *fokus, *private]

  - path_regex: services/headscale/.*\.enc\.yaml$
    key_groups:
      - age: [*nixheadscale, *fokus, *private]

  - path_regex: services/hedgedoc/postgres.enc.yaml$
    key_groups:
      - age: [*nixpostgres, *nixhedgedoc, *fokus, *private]

  - path_regex: services/hedgedoc/.*\.enc\.yaml$
    key_groups:
      - age: [*nixhedgedoc, *fokus, *private]

  - path_regex: services/adguard/.*\.enc\.yaml$
    key_groups:
      - age: [*nixadguard, *fokus, *private]
  # Adguard (LXC version)
  - path_regex: services/adguardhome/.*\.enc\.yaml$
    key_groups:
      - age: [*nixadguard, *fokus, *private]

  # Monitoring Stack
  - path_regex: services/(influxv2|grafana)/.*\.enc\.yaml$
    key_groups:
      - age: [*nixinflux, *nixgrafana, *fokus, *private]

  # Networking & Others
  - path_regex: services/nginx/.*\.enc\.yaml$
    key_groups:
      - age: [*nixnginx, *fokus, *private]

  - path_regex: services/netbox/.*\.enc\.yaml$
    key_groups:
      - age: [*nixheadscale, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/opencloud/secrets.enc.yaml$
    key_groups:
      - age: [*nixopencloud, *fokus, *private] # Adjust if netbox has its own key

  - path_regex: services/.*\/postgres\.enc\.yaml$
    key_groups:
      - age: [*nixpostgres, *fokus, *private]

  - path_regex: services/([^/]+)/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age: [*fokus, *private]
  # Catch-all for any other services (Safety net for the NAS)
  - path_regex: services/.*\.enc\.yaml$
    key_groups:
      - age: [*fokus, *private]
  - path_regex: secrets/.*\.enc\.toml$
    key_groups:
      - age: [*fokus, *private]

  - path_regex: secrets/pve2.enc\.yaml$
    key_groups:
      - age: [*fokus, *private, *pve2]

  - path_regex: hosts/hetzner-vps-01/secrets.enc.yaml$
    key_groups:
      - age: [*hetzner-vps-01, *fokus, *private]

  - path_regex: secrets/router.enc.yaml$
    key_groups:
      - age: [*fokus, *private]
